name: Beta Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for the beta release (e.g. v0.5.1-beta.1)'
        required: true
        default: 'beta'

jobs:
  validate:
    name: Validate Registration and Logic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.test.txt flake8

      - name: Lint with flake8
        run: |
          flake8 .

      - name: HACS Compliance Check
        uses: hacs/action@main
        with:
          category: integration
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Beta Release
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Ensure we can push back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest.json
        run: |
          VERSION="${{ github.event.inputs.version }}"
          jq ".version = \"$VERSION\"" custom_components/hoymiles_wifi/manifest.json > manifest.json.tmp && mv manifest.json.tmp custom_components/hoymiles_wifi/manifest.json

      - name: Commit and Push manifest.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add custom_components/hoymiles_wifi/manifest.json
          git commit -m "chore: update manifest version to ${{ github.event.inputs.version }} [skip ci]" || echo "No changes to commit"
          git push

      - name: Create Archive
        run: |
          zip -r hoymiles_wifi.zip custom_components/hoymiles_wifi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Beta Release ${{ github.event.inputs.version }}
          prerelease: true
          files: hoymiles_wifi.zip
          token: ${{ secrets.GITHUB_TOKEN }}
